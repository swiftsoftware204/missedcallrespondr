name: Deploy missedcall respondr

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build and Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: 178.156.221.18
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          # Acquire build lock — one build at a time (prevents OOM on 2vCPU/8GB)
          echo "=== Acquiring build lock ==="
          for i in $(seq 1 60); do
            if mkdir /tmp/rust-build.lock 2>/dev/null; then
              echo "Lock acquired after ${i}s"
              break
            fi
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "ERROR: Could not acquire build lock after 120s"
              exit 1
            fi
          done
          trap 'rmdir /tmp/rust-build.lock 2>/dev/null' EXIT

          cd /opt/swift/missedcall_respondr
          git pull origin main
          CARGO_BUILD_JOBS=1 /root/.cargo/bin/cargo build --release

          systemctl restart missedcallrespondr
          systemctl --no-pager status missedcallrespondr --no-pager | head -10
          echo "=== Deploy complete ==="
