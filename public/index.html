<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MissedCall Respondr</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#c9d1d9;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);padding:1rem;position:fixed;height:100vh;overflow-y:auto}
.sidebar h2{font-size:1.1rem;margin-bottom:1.5rem;color:var(--accent)}
.sidebar .nav-item{padding:.6rem .8rem;margin-bottom:.3rem;border-radius:6px;cursor:pointer;color:var(--text2);transition:.15s}
.sidebar .nav-item:hover,.sidebar .nav-item.active{background:var(--surface2);color:var(--text)}
.sidebar .nav-item.logout{margin-top:2rem;color:var(--red)}
.main{flex:1;margin-left:240px;padding:1.5rem}
.main h1{font-size:1.4rem;margin-bottom:1.5rem}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.2rem}
.stat-card .label{font-size:.8rem;color:var(--text2);margin-bottom:.3rem}
.stat-card .value{font-size:1.5rem;font-weight:600}
table{width:100%;border-collapse:collapse;margin-top:.5rem}
th,td{text-align:left;padding:.6rem .8rem;border-bottom:1px solid var(--border);font-size:.9rem}
th{color:var(--text2);font-weight:500;font-size:.8rem;text-transform:uppercase}
.btn{padding:.5rem 1rem;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:.85rem}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn.small{padding:.3rem .6rem;font-size:.8rem}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:.3rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.6rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.9rem}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.5rem;min-width:400px;max-width:600px;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:1rem}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:2rem;width:360px}
.login-box h1{font-size:1.3rem;margin-bottom:1.5rem;text-align:center}
.error-msg{color:var(--red);font-size:.85rem;margin-top:.5rem}
.toast{position:fixed;top:1rem;right:1rem;background:var(--green);color:#fff;padding:.8rem 1.2rem;border-radius:8px;z-index:200;animation:fadeIn .2s}
.toast.error{background:var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API = '';
let token = localStorage.getItem('token');
let user = null;
const view = {};

function api(path, opts={}) {
  opts.headers = opts.headers || {};
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (opts.body && typeof opts.body === 'object') {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  return fetch(API + path, opts).then(r => r.json().then(d => ({ok: r.ok, status: r.status, data: d})));
}

function toast(msg, err) {
  const d = document.createElement('div');
  d.className = 'toast' + (err ? ' error' : '');
  d.textContent = msg;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 2500);
}

function render(html) { document.getElementById('app').innerHTML = html; }

function loginPage() {
  render(`
    <div class="login-page">
      <div class="login-box">
        <h1>🔔 MissedCall Respondr</h1>
        <div class="form-group"><label>Email</label><input id="lemail" type="email" value="swiftsoftware143@yahoo.com"></div>
        <div class="form-group"><label>Password</label><input id="lpass" type="password" value="SwiftAdmin2026!"></div>
        <div class="error-msg" id="lerr"></div>
        <button class="btn primary" style="width:100%;margin-top:.5rem" onclick="doLogin()">Sign In</button>
        <div style="text-align:center;margin-top:10px">
          <a href="#" onclick="showForgotPw();return false" style="color:#6366f1;font-size:13px;text-decoration:none">Forgot Password?</a>
        </div>
      </div>
    </div>`);
}

/* Forgot & Reset Password */
function showForgotPw(){
  const ov=document.createElement('div');
  ov.id='forgot-modal';
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center';
  ov.onclick=function(e){if(e.target===this)ov.remove()};
  ov.innerHTML='<div style="background:var(--surface,#1a1d27);border:1px solid var(--border,#2d3248);border-radius:12px;padding:24px;max-width:420px;width:90vw">'
    +'<div id="forgot-step-email">'
    +'<h2 style="margin-bottom:8px">Reset Password</h2>'
    +'<p style="font-size:13px;color:var(--text2,#8b8fa3);margin-bottom:16px">Enter your email and we\'ll send you a reset code.</p>'
    +'<label style="display:block;font-size:12px;color:var(--text2,#8b8fa3);margin-bottom:4px">Email</label>'
    +'<input id="forgot-email" type="email" placeholder="you@example.com" style="background:var(--surface2,#232736);border:1px solid var(--border,#2d3248);color:var(--text,#e1e4ed);padding:10px 14px;border-radius:8px;font-size:14px;width:100%;margin-bottom:12px">'
    +'<div id="forgot-msg" style="display:none;padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:8px"></div>'
    +'<div id="forgot-success" style="display:none;padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:8px;background:rgba(52,211,153,.1);color:#34d399"></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end">'
    +'<button onclick="this.closest(\'#forgot-modal\').remove()" style="padding:8px 16px;background:var(--surface2,#232736);color:var(--text,#e1e4ed);border:1px solid var(--border,#2d3248);border-radius:8px;cursor:pointer;font-size:13px">Cancel</button>'
    +'<button id="forgot-btn" onclick="submitForgot()" style="padding:8px 16px;background:#6366f1;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px">Send Reset Code</button>'
    +'</div></div>'
    +'<div id="forgot-step-reset" style="display:none">'
    +'<h2 style="margin-bottom:8px">Set New Password</h2>'
    +'<p style="font-size:13px;color:var(--text2,#8b8fa3);margin-bottom:16px">Enter the code from your email and your new password.</p>'
    +'<label style="display:block;font-size:12px;color:var(--text2,#8b8fa3);margin-bottom:4px">Reset Code</label>'
    +'<input id="reset-token" type="text" placeholder="Paste the code" style="background:var(--surface2,#232736);border:1px solid var(--border,#2d3248);color:var(--text,#e1e4ed);padding:10px 14px;border-radius:8px;font-size:14px;width:100%;margin-bottom:12px">'
    +'<label style="display:block;font-size:12px;color:var(--text2,#8b8fa3);margin-bottom:4px">New Password</label>'
    +'<input id="reset-pw" type="password" placeholder="Minimum 8 characters" style="background:var(--surface2,#232736);border:1px solid var(--border,#2d3248);color:var(--text,#e1e4ed);padding:10px 14px;border-radius:8px;font-size:14px;width:100%;margin-bottom:12px">'
    +'<div id="reset-msg" style="display:none;padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:8px;background:rgba(239,68,68,.1);color:#ef4444"></div>'
    +'<div id="reset-success" style="display:none;padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:8px;background:rgba(52,211,153,.1);color:#34d399"></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end">'
    +'<button onclick="this.closest(\'#forgot-modal\').remove()" style="padding:8px 16px;background:var(--surface2,#232736);color:var(--text,#e1e4ed);border:1px solid var(--border,#2d3248);border-radius:8px;cursor:pointer;font-size:13px">Cancel</button>'
    +'<button id="reset-btn" onclick="submitReset()" style="padding:8px 16px;background:#6366f1;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px">Reset Password</button>'
    +'</div></div></div>';
  document.body.appendChild(ov);
}

async function submitForgot(){
  const email=document.getElementById('forgot-email').value.trim();
  const btn=document.getElementById('forgot-btn');
  const msg=document.getElementById('forgot-msg');
  const success=document.getElementById('forgot-success');
  msg.style.display='none';success.style.display='none';
  if(!email||!email.includes('@')){msg.textContent='Please enter a valid email';msg.style.cssText='display:block;padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:8px;background:rgba(239,68,68,.1);color:#ef4444';return}
  btn.textContent='Sending...';btn.disabled=true;
  try{
    const r=await fetch('/api/v1/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const d=await r.json();
    success.textContent=d.message||'If that email is registered, a reset code has been sent.';
    success.style.display='';
    btn.textContent='Sent ✓';btn.disabled=false;
    setTimeout(()=>{
      document.getElementById('forgot-step-email').style.display='none';
      document.getElementById('forgot-step-reset').style.display='';
    },1500);
  }catch(e){
    msg.textContent=e.message;msg.style.display='';
    btn.textContent='Send Reset Code';btn.disabled=false;
  }
}

async function submitReset(){
  const token=document.getElementById('reset-token').value.trim();
  const password=document.getElementById('reset-pw').value;
  const btn=document.getElementById('reset-btn');
  const msg=document.getElementById('reset-msg');
  const success=document.getElementById('reset-success');
  msg.style.display='none';success.style.display='none';
  if(!token){msg.textContent='Please enter the reset code';msg.style.display='';return}
  if(password.length<8){msg.textContent='Password must be at least 8 characters';msg.style.display='';return}
  btn.textContent='Please wait...';btn.disabled=true;
  try{
    const r=await fetch('/api/v1/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password})});
    if(!r.ok){const d=await r.json();throw new Error(d.message||d.error||'Reset failed')}
    success.textContent='Password reset successfully! You can now sign in.';
    success.style.display='';
    btn.textContent='Done';btn.disabled=true;
    setTimeout(()=>{const m=document.getElementById('forgot-modal');if(m)m.remove()},2000);
  }catch(e){
    msg.textContent=e.message;msg.style.display='';
    btn.textContent='Reset Password';btn.disabled=false;
  }
}

async function doLogin() {
  const email = document.getElementById('lemail').value;
  const password = document.getElementById('lpass').value;
  const res = await api('/api/v1/auth/login', {method:'POST', body:{email, password}});
  if (res.ok && res.data.token) {
    token = res.data.token;
    localStorage.setItem('token', token);
    user = res.data.user || {email};
    loadApp();
  } else {
    document.getElementById('lerr').textContent = res.data.message || 'Login failed';
  }
}

async function loadApp() {
  // Try to fetch current user
  const u = await api('/api/v1/auth/me');
  if (u.ok) user = u.data;
  renderApp();
  loadDashboard();
}

const pages = {
  dashboard: {label:'📊 Dashboard', fn: loadDashboard},
  calls: {label:'📞 Calls', fn: loadCalls},
  voicemails: {label:'📼 Voicemails', fn: loadVoicemails},
  'follow-ups': {label:'🔄 Follow-ups', fn: loadFollowUps},
  messages: {label:'✉️ Messages', fn: loadMessages},
  contacts: {label:'👤 Contacts', fn: loadContacts},
  'response-rules': {label:'⚙️ Response Rules', fn: loadResponseRules},
  integrations: {label:'🔗 Integrations', fn: loadIntegrations},
  'email-templates': {label:'📧 Email Templates', fn: loadEmailTemplates},
  settings: {label:'⚙️ Settings', fn: loadSettings},
};

function renderApp() {
  const navHtml = Object.entries(pages).map(([k,v]) =>
    `<div class="nav-item${view.page === k || (!view.page && k==='dashboard') ? ' active' : ''}" onclick="navigate('${k}')">${v.label}</div>`
  ).join('');
  render(`
    <div class="sidebar">
      <h2>MissedCall Respondr</h2>
      ${navHtml}
      <div class="nav-item logout" onclick="logout()">🚪 Logout</div>
    </div>
    <div class="main" id="main-content">
      <h1 id="page-title">Dashboard</h1>
      <div id="page-content"></div>
    </div>`);
}

function navigate(page) {
  view.page = page;
  const navs = document.querySelectorAll('.nav-item');
  navs.forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => {
    if (n.textContent.trim().toLowerCase().includes(page)) n.classList.add('active');
  });
  document.getElementById('page-title').textContent = pages[page].label;
  pages[page].fn();
}

function logout() { token = null; localStorage.removeItem('token'); render(loginPage()); }

async function loadDashboard() {
  const res = await api('/api/v1/dashboard/stats');
  const d = res.ok && res.data ? res.data : {};
  document.getElementById('page-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Total Calls</div><div class="value">${d.total_calls || d.totalCalls || 0}</div></div>
      <div class="stat-card"><div class="label">Missed Calls</div><div class="value">${d.missed_calls || d.missedCalls || 0}</div></div>
      <div class="stat-card"><div class="label">Voicemails</div><div class="value">${d.total_voicemails || d.totalVoicemails || 0}</div></div>
      <div class="stat-card"><div class="label">Follow-ups Today</div><div class="value">${d.follow_ups_today || d.followUpsToday || 0}</div></div>
    </div>
    <div class="stat-card" style="margin-top:1rem"><div class="label">Recent Activity</div>
      <div style="margin-top:.5rem;font-size:.9rem">${d.recent_activity || 'No recent activity'}</div>
    </div>`;
}

// --- Calls ---
async function loadCalls() {
  const res = await api('/api/v1/calls');
  const items = res.ok && res.data ? (res.data.data || res.data.calls || res.data) : [];
  document.getElementById('page-content').innerHTML = `
    <div class="page-header">
      <span></span>
      <button class="btn primary" onclick="showCallForm()">+ New Call</button>
    </div>
    <table><thead><tr><th>Phone</th><th>Status</th><th>Direction</th><th>Date</th><th>Actions</th></tr></thead>
    <tbody id="call-tbody">${items.map(i => `<tr>
      <td>${i.phone_number || i.caller || '-'}</td>
      <td>${i.status || '-'}</td>
      <td>${i.direction || '-'}</td>
      <td>${i.created_at ? new Date(i.created_at).toLocaleString() : '-'}</td>
      <td><button class="btn small" onclick="showCallDetail('${i.id}')">View</button></td>
    </tr>`).join('')}</tbody></table>`;
}

async function showCallForm() { toast('Creating calls via API - use integration'); }
async function showCallDetail(id) { toast('Call detail: ' + id); }

// --- Voicemails ---

  const res = await api('/api/v1/voicemails');
  const items = res.ok && res.data ? (res.data.data || res.data.voicemails || res.data) : [];
  document.getElementById('page-content').innerHTML = `<table><thead><tr><th>Call</th><th>URL</th><th>Duration</th><th>Date</th></tr></thead>
    <tbody>${items.map(i => `<tr>
      <td>${i.call_id || '-'}</td>
      <td>${i.url || i.file_url ? `<a href="${i.url||i.file_url}" target="_blank">Listen</a>` : '-'}</td>
      <td>${i.duration ? i.duration+'s' : '-'}</td>
      <td>${i.created_at ? new Date(i.created_at).toLocaleString() : '-'}</td>
    </tr>`).join('')}</tbody></table>`;
}

async function showFUPForm() { toast('New follow-up form'); }

  const res = await api('/api/v1/settings');
  const items = res.ok && res.data ? (res.data.data || res.data.settings || res.data) : [];
  const html = Array.isArray(items) ? `<table><thead><tr><th>Key</th><th>Value</th></tr></thead>
    <tbody>${items.map(i => `<tr><td>${i.key || i.setting_key || '-'}</td><td>${i.value || '-'}</td></tr>`).join('')}</tbody></table>` : '<p>Settings loaded</p>';

/* ===== EMAIL TEMPLATES ===== */
function loadEmailTemplates(){
  document.getElementById('page-content').innerHTML =
    '<div class="page-header"><span></span><button class="btn primary" onclick="showMCREmailTemplateForm({})">+ Add Template</button></div>'
    +'<div id="mcr-et-list">Loading...</div>';
  fetchMCREmailTemplates();
}

function fetchMCREmailTemplates(){
  api('/api/v1/email-templates').then(res=>{
    const items=res.ok&&res.data?res.data.items||[]:[];
    const list=document.getElementById('mcr-et-list');
    if(!list)return;
    if(!items.length){
      list.innerHTML='<p style="color:var(--text2);text-align:center;padding:2rem">No email templates yet.</p>';
      return;
    }
    let html='<table><thead><tr><th>Name</th><th>Subject</th><th>Type</th><th>Default</th><th>Actions</th></tr></thead><tbody>';
    items.forEach(t=>{
      const d=t.is_default?'✅':'—';
      html+='<tr>'
        +'<td>'+escMCR(t.name)+'</td>'
        +'<td>'+escMCR(t.subject||'')+'</td>'
        +'<td><span style="color:var(--accent)">'+escMCR(t.template_type||'')+'</span></td>'
        +'<td>'+d+'</td>'
        +'<td>'
        +'<button class="btn small" onclick="showMCREmailTemplateForm('+JSON.stringify(t).replace(/"/g,'&quot;')+')">✏️</button> '
        +'<button class="btn small danger" onclick="deleteMCREmailTemplate(\''+t.id+'\')">🗑</button>'
        +'</td></tr>';
    });
    html+='</tbody></table>';
    list.innerHTML=html;
  }).catch(()=>{
    const list=document.getElementById('mcr-et-list');
    if(list)list.innerHTML='<p style="color:var(--red)">Failed to load templates</p>';
  });
}

function escMCR(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function showMCREmailTemplateForm(template){
  const isNew=!template.id;
  const htmlMode=template.is_html!==false;
  const modal=document.createElement('div');
  modal.className='modal-overlay';
  modal.onclick=e=>{if(e.target===modal)modal.remove()};
  modal.innerHTML=
    '<div class="modal" style="max-width:700px">'
    +'<h3>'+(isNew?'New Email Template':'Edit: '+escMCR(template.name))+'</h3>'
    +'<div class="form-group"><label>Name</label><input id="mcr-et-name" value="'+escMCR(template.name||'')+'"></div>'
    +'<div class="form-group"><label>Template Type</label><select id="mcr-et-type">'
      +'<option value="welcome" '+(template.template_type==='welcome'?'selected':'')+'>Welcome</option>'
      +'<option value="purchase_confirmed" '+(template.template_type==='purchase_confirmed'?'selected':'')+'>Purchase Confirmed</option>'
      +'<option value="password_reset" '+(template.template_type==='password_reset'?'selected':'')+'>Password Reset</option>'
      +'<option value="custom" '+(template.template_type&&!['welcome','purchase_confirmed','password_reset'].includes(template.template_type)?'selected':'')+'>Custom</option>'
    +'</select></div>'
    +'<div class="form-group"><label>Subject</label><input id="mcr-et-subject" value="'+escMCR(template.subject||'')+'"></div>'
    +'<div class="form-group"><label>Content Mode</label>'
    +'<div style="display:flex;gap:12px">'
    +'<label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="radio" name="mcr-et-mode" value="html" '+(htmlMode?'checked':'')+' onchange="toggleMCRHtml(true)"> HTML</label>'
    +'<label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="radio" name="mcr-et-mode" value="text" '+(!htmlMode?'checked':'')+' onchange="toggleMCRHtml(false)"> Plain Text</label>'
    +'</div></div>'
    +'<div class="form-group"><label>Merge Fields</label>'
    +'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px">'
      +'<button class="btn small" onclick="insertMCRField(\'mcr-et-body\',\'{{name}}\')">{{name}}</button>'
      +'<button class="btn small" onclick="insertMCRField(\'mcr-et-body\',\'{{email}}\')">{{email}}</button>'
      +'<button class="btn small" onclick="insertMCRField(\'mcr-et-body\',\'{{password}}\')">{{password}}</button>'
      +'<button class="btn small" onclick="insertMCRField(\'mcr-et-body\',\'{{app_url}}\')">{{app_url}}</button>'
      +'<button class="btn small" onclick="insertMCRField(\'mcr-et-body\',\'{{plan_name}}\')">{{plan_name}}</button>'
      +'<button class="btn small" onclick="insertMCRField(\'mcr-et-body\',\'{{token}}\')">{{token}}</button>'
      +'<button class="btn small" onclick="insertMCRField(\'mcr-et-body\',\'{{account_name}}\')">{{account_name}}</button>'
    +'</div></div>'
    +'<div class="form-group"><label>Body (plain text)</label><textarea id="mcr-et-body" rows="8">'+escMCR(template.body||'')+'</textarea></div>'
    +'<div id="mcr-et-html-wrap" style="display:'+(htmlMode?'block':'none')+'">'
    +'<div class="form-group"><label>HTML Body</label><textarea id="mcr-et-html" rows="10" style="font-family:monospace">'+escMCR(template.html_body||'')+'</textarea></div>'
    +'</div>'
    +'<div class="form-group"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="mcr-et-default" '+(template.is_default?'checked':'')+'> Is Default</label></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end">'
    +'<button class="btn" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>'
    +'<button class="btn primary" onclick="saveMCRTemplate(\''+(template.id||'')+'\')">💾 Save</button>'
    +'</div></div>';
  document.body.appendChild(modal);
}

function toggleMCRHtml(isHtml){
  const w=document.getElementById('mcr-et-html-wrap');
  if(w)w.style.display=isHtml?'block':'none';
}

function insertMCRField(id,f){
  const ta=document.getElementById(id);
  if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd;
  ta.value=ta.value.substring(0,s)+f+ta.value.substring(e);
  ta.focus();ta.selectionStart=ta.selectionEnd=s+f.length;
}

function saveMCRTemplate(id){
  const name=document.getElementById('mcr-et-name').value.trim();
  if(!name){toast('Name is required',true);return;}
  let tt=document.getElementById('mcr-et-type').value;
  const isHtml=document.querySelector('input[name="mcr-et-mode"]:checked')?.value==='html';
  const data={
    name,
    subject:document.getElementById('mcr-et-subject').value.trim(),
    body:document.getElementById('mcr-et-body').value,
    html_body:isHtml?document.getElementById('mcr-et-html').value:'',
    is_html:isHtml,
    is_default:document.getElementById('mcr-et-default').checked,
    template_type:tt
  };
  const url=id?'/api/v1/email-templates/'+id:'/api/v1/email-templates';
  const method=id?'PUT':'POST';
  api(url,{method,body:data}).then(r=>{
    if(r.ok){
      document.querySelector('.modal-overlay')?.remove();
      fetchMCREmailTemplates();
      toast('Template saved!');
    }else{
      toast('Save failed: '+(r.data?.message||'Error'),true);
    }
  });
}

function deleteMCREmailTemplate(id){
  if(!confirm('Delete this email template?'))return;
  api('/api/v1/email-templates/'+id,{method:'DELETE'}).then(r=>{
    if(r.ok){fetchMCREmailTemplates();toast('Deleted');}
    else toast('Delete failed',true);
  });
}

// Init
if (token) { user = {email: 'swiftsoftware143@yahoo.com'}; renderApp(); loadDashboard(); }
else loginPage();
</script>
